<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YourCredence Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --surface2: #22263a;
      --border:   rgba(255,255,255,0.07);
      --text:     #f0f0f5;
      --muted:    rgba(240,240,245,0.45);
      --green:    #22c55e;
      --yellow:   #eab308;
      --red:      #ef4444;
      --blue:     #3b82f6;
    }

    html { width: 340px; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      min-height: 260px;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, #1a1d27, #141828);
    }

    .logo {
      width: 28px;
      height: 28px;
    }

    .header-text h1 {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.3px;
      color: var(--text);
    }

    .header-text p {
      font-size: 10px;
      color: var(--muted);
      font-weight: 400;
      letter-spacing: 0.2px;
    }

    /* ── Status pill ─────────────────────────────── */
    .status-pill {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .status-pill.active   { background: rgba(34,197,94,0.12); color: var(--green);  border: 1px solid rgba(34,197,94,0.25); }
    .status-pill.warning  { background: rgba(234,179,8,0.12);  color: var(--yellow); border: 1px solid rgba(234,179,8,0.25); }
    .status-pill.danger   { background: rgba(239,68,68,0.12);  color: var(--red);    border: 1px solid rgba(239,68,68,0.25); }
    .status-pill.offline  { background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid var(--border); }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .status-dot.blink { animation: blink 1.1s ease-in-out infinite; }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.2; } }

    /* ── Score section ───────────────────────────── */
    #score-section {
      padding: 18px 16px 14px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    #score-ring {
      position: relative;
      width: 72px;
      height: 72px;
      flex-shrink: 0;
    }

    #score-ring svg { transform: rotate(-90deg); }

    #ring-track  { fill: none; stroke: var(--surface2); stroke-width: 6; }
    #ring-value  { fill: none; stroke: var(--green); stroke-width: 6; stroke-linecap: round;
                   stroke-dasharray: 188.4; stroke-dashoffset: 188.4;
                   transition: stroke-dashoffset 0.9s ease, stroke 0.9s ease; }

    #score-num {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .score-meta {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .score-label { font-size: 11px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }

    .info-row { display: flex; flex-direction: column; gap: 2px; }
    .info-row span:first-child { font-size: 10px; color: var(--muted); }
    .info-row span:last-child  { font-size: 12px; font-weight: 600; }

    #action-msg {
      font-size: 11px;
      color: var(--muted);
      padding: 0 0 4px;
      font-style: italic;
    }

    /* ── Sparkline ───────────────────────────────── */
    #sparkline-section {
      padding: 0 16px 14px;
    }

    .section-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
      font-weight: 500;
    }

    #sparkline-canvas {
      width: 100%;
      height: 36px;
      display: block;
      border-radius: 4px;
      background: var(--surface);
    }

    /* ── Not connected state ─────────────────────── */
    #not-connected {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 20px;
      text-align: center;
      gap: 10px;
    }

    #not-connected .nc-icon { font-size: 32px; }
    #not-connected h2 { font-size: 14px; font-weight: 700; }
    #not-connected p { font-size: 11px; color: var(--muted); line-height: 1.5; }

    .btn-open {
      display: inline-block;
      margin-top: 4px;
      padding: 8px 18px;
      border-radius: 8px;
      background: var(--blue);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
    }
    .btn-open:hover { opacity: 0.85; }

    /* ── Footer ──────────────────────────────────── */
    .footer {
      border-top: 1px solid var(--border);
      padding: 8px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10px;
      color: var(--muted);
      background: var(--surface);
    }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <img src="icons/icon48.png" alt="YC" class="logo" />
  <div class="header-text">
    <h1>YourCredence Monitor</h1>
    <p>Continuous Authentication</p>
  </div>
  <div class="status-pill offline" id="status-pill">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">Offline</span>
  </div>
</div>

<!-- Connected state -->
<div id="connected-view" style="display:none;">
  <!-- Score ring + meta -->
  <div id="score-section">
    <div id="score-ring">
      <svg width="72" height="72" viewBox="0 0 72 72">
        <circle id="ring-track" cx="36" cy="36" r="30" />
        <circle id="ring-value" cx="36" cy="36" r="30" />
      </svg>
      <div id="score-num">—</div>
    </div>
    <div class="score-meta">
      <span class="score-label">Trust Score</span>
      <div class="info-row">
        <span>User</span>
        <span id="username-el">—</span>
      </div>
      <div class="info-row">
        <span>Session</span>
        <span id="session-status-el">Active</span>
      </div>
      <div id="action-msg"></div>
    </div>
  </div>

  <!-- Sparkline -->
  <div id="sparkline-section">
    <div class="section-label">Score History</div>
    <canvas id="sparkline-canvas" height="36"></canvas>
  </div>
</div>

<!-- Not connected state -->
<div id="not-connected">
  <div class="nc-icon">🔒</div>
  <h2>Not Connected</h2>
  <p>Log in to the YourCredence platform to start continuous authentication monitoring.</p>
  <button class="btn-open" id="btn-open">Open Platform</button>
</div>

<!-- Footer -->
<div class="footer">
  <span>YourCredence v1.0</span>
  <span id="footer-update">—</span>
</div>

<script src="popup.js"></script>
</body>
</html>
