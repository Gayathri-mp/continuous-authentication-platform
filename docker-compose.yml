version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: auth_db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-authuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-authdb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authuser -d authdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - auth_network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: auth_backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-authuser}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-authdb}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: HS256
      JWT_EXPIRATION_MINUTES: 60
      RP_ID: ${RP_ID:-localhost}
      RP_NAME: ${RP_NAME:-Adaptive Auth Platform}
      RP_ORIGIN: ${RP_ORIGIN:-http://localhost:8080}
      TRUST_THRESHOLD_OK: 70
      TRUST_THRESHOLD_MONITOR: 40
      TRUST_THRESHOLD_STEPUP: 20
      BATCH_INTERVAL_SECONDS: 5
      FEATURE_WINDOW_SECONDS: 10
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - auth_network

  # Nginx Frontend Server
  frontend:
    image: nginx:alpine
    container_name: auth_frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - auth_network

volumes:
  postgres_data:
    driver: local

networks:
  auth_network:
    driver: bridge
